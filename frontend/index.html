<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#6366f1">
  <meta name="description" content="Sistema de anotações pessoais com Markdown">
  <title>Notas</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-brand">📝 Notas</div>
      <div class="sidebar-search">
        <div class="search-input-wrap">
          <span class="search-icon">⌕</span>
          <input type="search" id="search-input" placeholder="Buscar notas…" aria-label="Buscar notas">
        </div>
      </div>
      <nav id="sidebar-nav">
        <button class="nav-item active" id="btn-all-notes">
          <span class="nav-icon">📋</span><span>Todas as notas</span>
        </button>
      </nav>
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span>Tags</span>
          <button id="btn-manage-hashtags" class="btn-link-sm" title="Gerenciar tags">⚙</button>
        </div>
        <ul id="hashtag-list" role="list"></ul>
      </div>
      <div class="sidebar-footer">
        <button id="btn-theme-toggle" class="nav-item">
          <span id="theme-icon">🌙</span><span>Alternar tema</span>
        </button>
      </div>
    </aside>
    <div id="sidebar-overlay"></div>

    <div id="main-wrapper">
      <header id="top-bar">
        <button id="btn-sidebar-toggle" class="btn-icon-sm" aria-label="Menu">☰</button>
        <span class="topbar-brand">Notas</span>
      </header>

      <main id="main">
        <div id="content-col">
        <div id="editor-box">
          <div id="editor-mode-bar" hidden>
            <span id="editor-mode-label">Editando nota</span>
            <button id="btn-cancel-edit" class="btn-text-sm">Cancelar</button>
          </div>
          <div id="editor-toolbar">
            <button class="tb-btn" data-action="bold" title="Negrito (Ctrl+B)"><strong>B</strong></button>
            <button class="tb-btn tb-italic" data-action="italic" title="Itálico (Ctrl+I)">I</button>
            <button class="tb-btn" data-action="heading" title="Título">H</button>
            <div class="tb-sep"></div>
            <button class="tb-btn" data-action="ul" title="Lista">•</button>
            <button class="tb-btn" data-action="ol" title="Lista numerada">1.</button>
            <div class="tb-sep"></div>
            <button class="tb-btn tb-mono" data-action="code" title="Código">`…`</button>
            <button class="tb-btn" data-action="link" title="Link">🔗</button>
          </div>
          <textarea id="editor-textarea" placeholder="Escreva uma nota… Use #hashtag para categorizar" rows="3"></textarea>
          <div id="editor-footer">
            <div id="editor-tags-preview"></div>
            <div class="editor-footer-actions">
              <label class="btn-attach" for="file-input" title="Anexar arquivo">📎 Anexar</label>
              <input type="file" id="file-input" accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx" hidden>
              <button id="btn-save" class="btn-primary">Salvar</button>
            </div>
          </div>
          <div id="attachments-section" hidden>
            <div id="attachments-list"></div>
          </div>
        </div>

        <div id="notes-feed">
          <div id="feed-header" hidden>
            <span id="notes-count" class="text-muted"></span>
          </div>
          <div id="notes-list" role="list"></div>
          <div id="notes-empty" class="empty-state" hidden>
            <p>Nenhuma nota encontrada.</p>
          </div>
        </div><!-- /#notes-feed -->
        </div><!-- /#content-col -->
      </main>
    </div>
  </div>

  <!-- PIN authentication overlay -->
  <div id="pin-overlay" hidden>
    <div class="pin-box">
      <div class="pin-brand">📝 Notas</div>
      <p class="pin-subtitle">Digite o PIN para acessar</p>
      <input type="password" id="pin-input" class="pin-input" placeholder="••••" maxlength="32" inputmode="numeric" autocomplete="current-password">
      <div id="pin-error" class="pin-error" hidden>PIN incorreto</div>
      <button id="btn-pin-submit" class="btn-primary" style="width:100%">Entrar</button>
    </div>
  </div>

  <div id="modal-hashtags" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title">Gerenciar Tags</h2>
        <button id="btn-close-modal" class="btn-icon" aria-label="Fechar">&times;</button>
      </div>
      <div id="modal-hashtags-list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
